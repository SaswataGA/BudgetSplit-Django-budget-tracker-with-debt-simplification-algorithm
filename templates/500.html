<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Error</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; text-align: center; padding: 80px 20px; }
        h1 { font-size: 4rem; color: #dc3545; margin-bottom: 0; }
        p { font-size: 1.25rem; color: #333; }
        a { color: #0d6efd; }
    </style>
</head>
<body>
    <!--
        Deliberately NOT extending base.html: a 500 error means
        something already went wrong server-side, so this page avoids
        depending on context processors, the database, or any custom
        template tags that could themselves fail and mask the real error
        with a second one. Kept fully self-contained per Django's own
        documented convention for error templates.
    -->
    <h1>500</h1>
    <p>Something went wrong on our end.</p>
    <p><a href="/">Go back home</a></p>
</body>
</html>
