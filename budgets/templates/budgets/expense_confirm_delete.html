{% extends "base.html" %}
{% block title %}Delete Expense - BudgetSplit{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="mb-3">Delete Expense</h3>
            <p>Delete the {{ expense.amount }} expense in <strong>{{ expense.category.name }}</strong> on {{ expense.date }}?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'budgets:expense_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
